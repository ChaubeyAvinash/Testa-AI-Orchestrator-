version: '3.9'

services:

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: file:./dev.db
      AZURE_INFERENCE_ENDPOINT: ${AZURE_INFERENCE_ENDPOINT}
      AZURE_AI_API_KEY: ${AZURE_AI_API_KEY}
      AZURE_AI_MODEL: ${AZURE_AI_MODEL:-gpt-5.1}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-20}
      PLAYWRIGHT_TEST_TIMEOUT: ${PLAYWRIGHT_TEST_TIMEOUT:-30000}
      PLAYWRIGHT_MAX_CONCURRENCY: ${PLAYWRIGHT_MAX_CONCURRENCY:-2}
    ports:
      - '3001:3001'
    volumes:
      - sqlite_data:/app/apps/api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  sqlite_data:
